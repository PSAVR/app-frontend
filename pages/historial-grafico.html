<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Historial — Gráfico</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="../styles/historial-grafico.css" />
</head>
<body>
  <section class="stage">
      <canvas id="lavaCanvas" width="2048" height="1024" style="position:fixed; top:0; left:0; width:100%; height:100%;
         z-index:-1; pointer-events:none;"></canvas>
    <h1 class="title" id="pageTitle">Nivel *</h1>

    <div class="tab-nav">
      <button class="tab-btn active" id="tabBtnHoy"       onclick="switchTab('hoy')">Hoy</button>
      <button class="tab-btn"        id="tabBtnHistorial" onclick="switchTab('historial')">Historial</button>
    </div>

    <div class="tab-panel active" id="panelHoy">
      <div class="session-summary" id="todaySummary" style="display:none"></div>

      <div class="chart-block chart-has-data" id="todayChartWithData" style="display:none">
        <div class="chart-box">
          <canvas id="todayChart"></canvas>
        </div>
        <p id="todayPeriodMsg" class="chart-period-msg"></p>
      </div>

      <div class="chart-block chart-no-data" id="todayChartNoData">
        <p id="todayStatusMsg" class="today-empty">Cargando…</p>
      </div>
    </div>

    <div class="tab-panel" id="panelHistorial">
      <div class="controls">
        <div class="date-selector">
          <div class="date-group">
            <label for="startDate">Fecha Inicio</label>
            <input type="date" id="startDate" />
          </div>
          <div class="date-group">
            <label for="endDate">Fecha Fin</label>
            <input type="date" id="endDate" />
          </div>
        </div>
        <div class="week-nav">
          <button id="prevWeek" title="Semana anterior">‹</button>
          <span class="week-info" id="weekInfo">Semana actual</span>
          <button id="nextWeek" title="Semana siguiente">›</button>
        </div>
      </div>

      <div class="chart-block chart-has-data" id="chartWithData">
        <div class="chart-box">
          <canvas id="histChart"></canvas>
        </div>
        <p id="periodMsg" class="chart-period-msg"></p>
      </div>

      <div class="chart-block chart-no-data" id="chartNoData">
        <p id="statusMsg"></p>
      </div>
    </div>

  </section>
  <script>
  const API_BASE = '';

  let historialLoaded = false;
  function switchTab(tab) {
    document.getElementById('panelHoy').classList.toggle('active', tab === 'hoy');
    document.getElementById('panelHistorial').classList.toggle('active', tab === 'historial');
    document.getElementById('tabBtnHoy').classList.toggle('active', tab === 'hoy');
    document.getElementById('tabBtnHistorial').classList.toggle('active', tab === 'historial');

    if (tab === 'historial' && !historialLoaded && userData && levelData) {
      historialLoaded = true;
      loadHistorialTab();
    }
  }

  async function loadHistorialTab() {
    const statusEl = document.getElementById('statusMsg');
    try {
      hasAnySessionsForThisLevel = await hasAnySessionForLevel(userData.user_id, levelData.level_id);
      if (!hasAnySessionsForThisLevel) {
        document.getElementById('chartWithData').style.display = 'none';
        document.getElementById('chartNoData').style.display   = 'flex';
        statusEl.textContent = 'Aún no tienes registros de simulaciones. Realiza tu primera práctica para comenzar a ver tu progreso';
        return;
      }
      const today = new Date(); today.setHours(0,0,0,0);
      currentEndDate   = new Date(today);
      currentStartDate = new Date(today); currentStartDate.setDate(today.getDate() - 6);
      document.getElementById('startDate').valueAsDate = currentStartDate;
      document.getElementById('endDate').valueAsDate   = currentEndDate;
      updateWeekInfo();
      await loadData();
    } catch (err) {
      console.error(err);
      statusEl.textContent = 'No se pudo cargar el historial.';
    }
  }

  async function fetchTodaySessions(userId, levelId) {
    const r = await fetch(
      `${API_BASE}/api/sessions/users/${userId}/sessions/level/${levelId}/today`,
      { credentials: 'include' }
    );
    if (!r.ok) throw new Error('No se pudo cargar sesiones de hoy');
    return r.json();
  }

  async function runCleanup() {
    try {
      await fetch(`${API_BASE}/api/sessions/sessions/cleanup`, {
        method: 'POST', credentials: 'include'
      });
    } catch (e) { console.warn('Cleanup silenciado:', e); }
  }

  function parseAnxiety(row) {
    const summary = row.performance_summary || '';
    const match = summary.match(/anxiety\s*=\s*([\d.]+)/i);
    if (match) return parseFloat(match[1]);
    return Number(row.anxiety_pct ?? 0);
  }

  function renderTodaySummary(rows) {
    const anx   = rows.map(parseAnxiety);
    const best  = Math.round(Math.min(...anx));
    const last  = Math.round(anx[anx.length - 1]);
    const avg   = Math.round(anx.reduce((a, b) => a + b, 0) / anx.length);
    const stars = Math.max(...rows.map(r => r.star_rating ?? 0));
    const el = document.getElementById('todaySummary');
    el.innerHTML = `
      <div class="summary-pill">Sesiones hoy: <span>${rows.length}</span></div>
      <div class="summary-pill">Mejor: <span>${best}%</span></div>
      <div class="summary-pill">Última: <span>${last}%</span></div>
      <div class="summary-pill">Promedio: <span>${avg}%</span></div>
      <div class="summary-pill">Máx. ★: <span>${'★'.repeat(stars)}${'☆'.repeat(3 - stars)}</span></div>
    `;
    el.style.display = 'flex';
  }

  let todayChart;
  function renderTodayChart(rows) {
    const ctx = document.getElementById('todayChart').getContext('2d');
    if (todayChart) todayChart.destroy();

    const labels   = rows.map((_, i) => `Sesión ${i + 1}`);
    const data     = rows.map(r => Math.round(parseAnxiety(r)));
    const tooltips = rows.map(r => ({
      anxiety:   Math.round(parseAnxiety(r)),
      star:      r.star_rating ?? 0,
      emo:       r.emotion_result || '—',
      pauses:    r.pauses_count ?? 0,
      played_at: new Date(r.played_at).toLocaleString('es-PE', { timeZone: 'America/Lima' })
    }));

    const pointColors = data.map(v => v < 33.3 ? '#4ade80' : v <= 66.6 ? '#facc15' : '#f87171');

    todayChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          label: 'Ansiedad por sesión',
          data,
          borderColor: '#A998FF',
          backgroundColor: function(context) {
            const chart = context.chart;
            const {ctx: c, chartArea} = chart;
            if (!chartArea) return 'rgba(169,152,255,0.1)';
            const g = c.createLinearGradient(0, chartArea.top, 0, chartArea.bottom);
            g.addColorStop(0,   'rgba(169,152,255,0.35)');
            g.addColorStop(1,   'rgba(169,152,255,0.03)');
            return g;
          },
          borderWidth: 3,
          fill: true,
          tension: 0.3,
          pointRadius: 10,
          pointHoverRadius: 14,
          pointBackgroundColor: pointColors,
          pointBorderColor: '#fff',
          pointBorderWidth: 3,
          pointHoverBorderColor: '#fff',
          pointHoverBorderWidth: 4,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { intersect: false, mode: 'index' },
        scales: {
          y: {
            title: { display: true, text: 'Porcentaje de Ansiedad', font: { size: 20, weight: '700' }, color: '#5E5E5E' },
            ticks: { stepSize: 20, font: { size: 18, weight: '600' }, color: '#5E5E5E', callback: v => v + '%' },
            beginAtZero: true, max: 100,
            grid: { color: 'rgba(94,94,94,0.08)', lineWidth: 1 }
          },
          x: {
            ticks: { font: { size: 13, weight: '600' }, color: '#5E5E5E', maxRotation: 45, minRotation: 45 },
            grid: { display: false }
          }
        },
        plugins: {
          legend: { display: false },
          tooltip: {
            titleColor: '#5E5E5E', bodyColor: '#5E5E5E',
            titleFont: { size: 18, weight: '700' }, bodyFont: { size: 16 },
            backgroundColor: 'rgba(255,255,255,0.98)',
            borderColor: 'rgba(169,152,255,0.5)', borderWidth: 2,
            padding: 16, cornerRadius: 12, displayColors: false,
            callbacks: {
              title: items => items[0].label,
              label: (ctx) => {
                const t = tooltips[ctx.dataIndex];
                if (!t || t.played_at === '—') return 'Sin datos';
                const stars = '★'.repeat(t.star) + '☆'.repeat(3 - t.star);
                return [
                  `Ansiedad: ${Math.round(t.anxiety)}%`,
                  `Estrellas: ${stars}`,
                  `Pausas: ${t.pauses}`,
                  `Hora: ${t.played_at}`
                ];
              }
            }
          }
        },
        animation: { duration: 800, easing: 'easeInOutQuart' }
      }
    });
  }

  async function loadTodayData() {
    const statusEl = document.getElementById('todayStatusMsg');
    try {
      statusEl.textContent = 'Cargando…';
      const rows = await fetchTodaySessions(userData.user_id, levelData.level_id);
      if (!rows.length) {
        document.getElementById('todayChartWithData').style.display = 'none';
        document.getElementById('todayChartNoData').style.display   = 'flex';
        statusEl.textContent = '¡Todavía no tienes sesiones hoy! Realiza tu primera práctica del día.';
        return;
      }
      renderTodaySummary(rows);
      renderTodayChart(rows);
      document.getElementById('todayChartWithData').style.display = 'block';
      document.getElementById('todayChartNoData').style.display   = 'none';
    } catch (err) {
      console.error(err);
      statusEl.textContent = 'No se pudo cargar las sesiones de hoy.';
    }
  }

  

  function getQueryParams(){
    const p = new URLSearchParams(location.search);
    return {
      level: (p.get('level') || 'Facil').trim()
    };
  }

  async function ensureSession(){
    const r = await fetch(`${API_BASE}/api/auth/me`, { credentials:'include' });
    if(!r.ok){ location.href='/index.html'; return null; }
    return r.json();
  }

  async function fetchLevelIdByName(name){
    const r = await fetch(`${API_BASE}/api/levels/by-name/${encodeURIComponent(name)}`, { credentials:'include' });
    if(!r.ok) throw new Error('Nivel no encontrado');
    return r.json();
  }

  async function fetchHistory(userId, levelId, startDate, endDate){
    const start = startDate.toISOString().split('T')[0];
    const end = endDate.toISOString().split('T')[0];
    const r = await fetch(`${API_BASE}/api/users/${userId}/history/level/${levelId}?start=${start}&end=${end}`, { credentials:'include' });
    if(!r.ok) throw new Error('No se pudo cargar historial');
    return r.json();
  }

  async function hasAnySessionForLevel(userId, levelId) {
    const r = await fetch(`${API_BASE}/api/users/${userId}/progress`, {
      credentials: 'include'
    });
    if (!r.ok) {
      console.error('No se pudo obtener progreso');
      return false;
    }
    const rows = await r.json();
    const lvl = rows.find(x => x.level_id === levelId);
    if (!lvl) return false;
    return Number(lvl.attempts || 0) > 0;
  }

  function localDateKey(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  }

  function formatDate(date) {
    return date.toLocaleDateString('es-PE', { day: '2-digit', month: '2-digit' });
  }

  function buildDataset(rows, startDate, endDate){
    const map = new Map();

    rows.forEach(r => {
      const d = new Date(r.played_at);
      const key = localDateKey(d);
      let anxiety = 0;
      const summary = r.performance_summary || '';
      const match = summary.match(/anxiety\s*=\s*([\d.]+)/i);
      if (match) {
        anxiety = parseFloat(match[1]);
      } else {
        anxiety = Number(r.anxiety_pct ?? 0);
      }

      map.set(key, {
        anxiety,
        star: r.star_rating ?? 0,
        emo: r.emotion_result || '—',
        pauses: r.pauses_count ?? 0,
        played_at: d.toLocaleString('es-PE', { timeZone: 'America/Lima' })
      });
    });

    const labels = [];
    const data = [];
    const tooltips = [];

    const cur = new Date(startDate);
    cur.setHours(0,0,0,0);
    const end = new Date(endDate);
    end.setHours(0,0,0,0);

    while (cur <= end) {
      const key = localDateKey(cur);
      const dayName = cur.toLocaleDateString('es-PE', { weekday: 'short' });
      labels.push(`${dayName.charAt(0).toUpperCase() + dayName.slice(1)} ${formatDate(cur)}`);

      if (map.has(key)) {
        const v = map.get(key);
        data.push(Math.round(v.anxiety));
        tooltips.push(v);
      } else {
        data.push(null);
        tooltips.push({ anxiety: 0, star: 0, emo: '—', pauses: 0, played_at: '—' });
      }

      cur.setDate(cur.getDate() + 1);
    }

    return { labels, data, tooltips };
  }

  let chart;
  function renderChart(dataset){
    const ctx = document.getElementById('histChart').getContext('2d');
    if (chart) chart.destroy();

    chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: dataset.labels,
        datasets: [{
          label: 'Porcentaje de Ansiedad',
          data: dataset.data,
          borderColor: '#A998FF',
          backgroundColor: function(context) {
            const chart = context.chart;
            const {ctx, chartArea} = chart;
            if (!chartArea) return 'rgba(169, 152, 255, 0.1)';
            
            const gradient = ctx.createLinearGradient(0, chartArea.top, 0, chartArea.bottom);
            gradient.addColorStop(0, 'rgba(169, 152, 255, 0.4)');
            gradient.addColorStop(0.5, 'rgba(169, 152, 255, 0.2)');
            gradient.addColorStop(1, 'rgba(169, 152, 255, 0.05)');
            return gradient;
          },
          borderWidth: 4,
          fill: true,
          tension: 0.3,
          pointRadius: 8,
          pointHoverRadius: 12,
          pointBackgroundColor: '#A998FF',
          pointBorderColor: '#fff',
          pointBorderWidth: 3,
          pointHoverBackgroundColor: '#8B7AE5',
          pointHoverBorderColor: '#fff',
          pointHoverBorderWidth: 4,
          spanGaps: true,
          segment: {
            borderDash: [5,5]
          }
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: {
          intersect: false,
          mode: 'index'
        },
        scales: {
          y: {
            title: { 
              display: true, 
              text: 'Porcentaje de Ansiedad', 
              font: { size: 20, weight: '700' }, 
              color: '#5E5E5E' 
            },
            ticks: { 
              stepSize: 20, 
              font: { size: 18, weight: '600' },
              color: '#5E5E5E',
              callback: function(value) {
                return value + '%';
              }
            },
            beginAtZero: true, 
            max: 100, 
            grid: { 
              color: 'rgba(94,94,94,0.08)',
              lineWidth: 1
            }
          },
          x: {
            ticks: { 
              font: { size: 13, weight: '600' }, 
              color: '#5E5E5E',
              maxRotation: 45,
              minRotation: 45
            },
            grid: { display: false }
          }
        },
        plugins: {
          legend: { display: false },
          tooltip: {
            titleColor: '#5E5E5E',
            bodyColor: '#5E5E5E',
            titleFont: { size: 18, weight: '700' },
            bodyFont: { size: 16 },
            backgroundColor: 'rgba(255,255,255,0.98)',
            borderColor: 'rgba(169,152,255,0.5)',
            borderWidth: 2,
            padding: 16,
            cornerRadius: 12,
            displayColors: false,
            callbacks: {
              title: function(tooltipItems) {
                return tooltipItems[0].label;
              },
              label: (ctx) => {
                const i = ctx.dataIndex;
                const t = dataset.tooltips[i];
                if (t.played_at === '—') return 'Sin datos para este día';
                return [
                  `Ansiedad: ${Math.round(t.anxiety)}%`,
                  `Estrellas: ${t.star}`,
                  `Pausas: ${t.pauses}`,
                  `Registrado: ${t.played_at}`
                ];
              }
            }
          }
        },
        animation: { 
          duration: 800, 
          easing: 'easeInOutQuart' 
        }
      }
    });
  }

  let currentStartDate;
  let currentEndDate;
  let userData;
  let levelData;
  let hasAnySessionsForThisLevel = true;

  function updateWeekInfo() {
    const weekInfo = document.getElementById('weekInfo');
    const start = formatDate(currentStartDate);
    const end = formatDate(currentEndDate);
    weekInfo.textContent = `${start} - ${end}`;
    
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const endOfDay = new Date(currentEndDate);
    endOfDay.setHours(23, 59, 59, 999);
    document.getElementById('nextWeek').disabled = endOfDay >= today;
  }

  function setWeekRange(startDate) {
    currentStartDate = new Date(startDate);
    currentEndDate = new Date(startDate);
    currentEndDate.setDate(currentEndDate.getDate() + 6);
    
    const today = new Date();
    today.setHours(23, 59, 59, 999);
    if (currentEndDate > today) {
      currentEndDate = new Date(today);
      currentEndDate.setHours(0, 0, 0, 0);
    }
    
    document.getElementById('startDate').valueAsDate = currentStartDate;
    document.getElementById('endDate').valueAsDate = currentEndDate;
    
    updateWeekInfo();
  }

  async function loadData() {
  const periodMsg = document.getElementById('periodMsg');

  if (!hasAnySessionsForThisLevel) return;

  try {
    periodMsg.textContent = 'Cargando…';
    const rows = await fetchHistory(
      userData.user_id,
      levelData.level_id,
      currentStartDate,
      currentEndDate
    );

    if (!rows.length) {
      document.getElementById('chartWithData').style.display = 'none';
      document.getElementById('chartNoData').style.display   = 'flex';
      document.getElementById('statusMsg').textContent = 'No hay sesiones en este período.';
      periodMsg.textContent = '';
      return;
    }

    const ds = buildDataset(rows, currentStartDate, currentEndDate);
    renderChart(ds);

    document.getElementById('chartWithData').style.display = 'block';
    document.getElementById('chartNoData').style.display   = 'none';
    periodMsg.textContent = '';
  } catch (err) {
    console.error(err);
    periodMsg.textContent = 'No se pudo cargar el historial.';
  }
}


  document.getElementById('prevWeek').addEventListener('click', () => {
    const newStart = new Date(currentStartDate);
    newStart.setDate(newStart.getDate() - 7);
    setWeekRange(newStart);
    loadData();
  });

  document.getElementById('nextWeek').addEventListener('click', () => {
    const newStart = new Date(currentStartDate);
    newStart.setDate(newStart.getDate() + 7);
    setWeekRange(newStart);
    loadData();
  });

  document.getElementById('startDate').addEventListener('change', (e) => {
    currentStartDate = e.target.valueAsDate;
    if (currentStartDate > currentEndDate) {
      currentEndDate = new Date(currentStartDate);
      document.getElementById('endDate').valueAsDate = currentEndDate;
    }
    updateWeekInfo();
    loadData();
  });

  document.getElementById('endDate').addEventListener('change', (e) => {
    currentEndDate = e.target.valueAsDate;
    if (currentEndDate < currentStartDate) {
      currentStartDate = new Date(currentEndDate);
      document.getElementById('startDate').valueAsDate = currentStartDate;
    }
    updateWeekInfo();
    loadData();
  });

  (async ()=>{
    const { level } = getQueryParams();
    const pretty = { Facil:'Fácil', Intermedio:'Intermedio', Dificil:'Difícil' }[level] || level;
    document.getElementById('pageTitle').textContent = `Nivel ${pretty}`;

    try{
      userData = await ensureSession(); 
      if(!userData) return;
      
      levelData = await fetchLevelIdByName(level);


      await loadTodayData();

    }catch(err){
      console.error(err);
      document.getElementById('todayStatusMsg').textContent = 'No se pudo cargar las sesiones de hoy.';
    }
  })();
</script>
<script src="./js/logout.js"></script>
<script src="./js/home-icon.js"></script>
<script src="./js/fondo-lava.js"></script>
</body>

</html>
